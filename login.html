<!DOCTYPE html>
<html lang="de">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Login | Finance App</title><link rel="stylesheet" href="styles.css" /></head>
<body class="login-body">
  <section class="auth-card"><p class="eyebrow">Smart Finance</p><h1>💰 Finance App</h1><p class="auth-subtitle">Melde dich an und verwalte deine Finanzen smarter.</p><input id="login-username" placeholder="Benutzername" autocomplete="username" /><div class="password-row"><input id="login-password" type="password" placeholder="Passwort" autocomplete="current-password" /><button type="button" onclick="togglePassword('login-password')">👁️</button></div><button class="primary-btn" onclick="login()">Login</button><p class="switch-link" onclick="openRegister()">Noch keinen Account? <b>Registrieren</b></p><p id="msg" class="message"></p></section>
  <div id="register-modal" class="modal hidden"><div class="modal-content"><button class="close-btn" onclick="closeRegister()">×</button><h2>Account erstellen</h2><p class="auth-subtitle">Registriere dich kostenlos.</p><input id="register-username" placeholder="Benutzername" autocomplete="username" /><div class="password-row"><input id="register-password" type="password" placeholder="Passwort" autocomplete="new-password" /><button type="button" onclick="togglePassword('register-password')">👁️</button></div><div class="password-row"><input id="confirm-password" type="password" placeholder="Passwort bestätigen" autocomplete="new-password" /><button type="button" onclick="togglePassword('confirm-password')">👁️</button></div><div class="strength-bar"><div id="strength-fill"></div></div><p id="strength-text" class="message"></p><button class="primary-btn" onclick="register()">Register Now</button></div></div>
  <div id="app-transition" class="app-transition hidden"><div class="transition-box"><div class="spinner"></div><p>Dashboard wird geladen...</p></div></div>
  <script src="login.js"></script>
</body>
</html>
